<html lang="en">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

</head>

<body>

        <button id="new_character_button">New Character</button>

        <div id="options_modal" class="modal">

                <span class="close">&times;</span>
                <p>Testing!</p>
            </div>
        </div>

        <div id="tabs">
            <button id="sheet_select_button_character">Character Sheet</button>
            <button>Info Sheet</button>
            <button>Spells Sheet</button>

        <div id="character_sheet" class="hidden" class="sheet">
            <p>This is a character sheet</p>
        </div>
        <div id="info_sheet" class="hidden" class="sheet">
            <p>This is an information sheet</p>
        </div>
        <div id="spell_sheet" class="hidden" class="sheet">
            <p>This is a spell sheet</p>
        </div>
    </main>
