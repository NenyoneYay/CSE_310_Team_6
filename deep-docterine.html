<div id="vis-container" class="">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.sheet{padding:1rem 0}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.toolbar span{font-size:13px;color:var(--color-text-secondary);margin-right:4px}
.section-list{display:flex;flex-direction:column;gap:12px}
.section{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);overflow:hidden}
.section-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);cursor:grab;user-select:none}
.section-header:active{cursor:grabbing}
.section-title{font-size:14px;font-weight:500;flex:1;background:transparent;border:none;color:var(--color-text-primary);font-family:var(--font-sans)}
.section-title:focus{outline:none;border-bottom:1px solid var(--color-border-primary)}
.drag-handle{color:var(--color-text-secondary);font-size:16px;cursor:grab}
.field-list{display:flex;flex-wrap:wrap;gap:8px;padding:12px}
.field{display:flex;align-items:center;gap:8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;cursor:grab;user-select:none;min-width:150px;flex:1}
.field:active{cursor:grabbing}
.field-handle{color:var(--color-text-secondary);font-size:14px;flex-shrink:0}
.field-inner{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.field-label{font-size:11px;color:var(--color-text-secondary);font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.field-input{font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:0.5px solid transparent;color:var(--color-text-primary);font-family:var(--font-sans);width:100%;padding:0;cursor:text}
.field-input:focus{outline:none;border-bottom-color:var(--color-border-primary)}
.field-input[type=number]{-moz-appearance:textfield}
.field-input[type=number]::-webkit-outer-spin-button,
.field-input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.field-input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--color-text-info)}
.field-textarea{font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:0.5px solid transparent;color:var(--color-text-primary);font-family:var(--font-sans);width:100%;padding:0;cursor:text;resize:none;min-height:40px;line-height:1.4}
.field-textarea:focus{outline:none;border-bottom-color:var(--color-border-primary)}
.field-input:hover,.field-textarea:hover{border-bottom-color:var(--color-border-tertiary)}
.field-type-badge{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);flex-shrink:0}
.delete-btn{background:none;border:none;color:var(--color-text-secondary);cursor:pointer;font-size:14px;padding:2px;line-height:1;opacity:0.4;flex-shrink:0}
.delete-btn:hover{opacity:1;color:#E24B4A}
.add-field-row{display:flex;gap:6px;padding:0 12px 10px;flex-wrap:wrap;align-items:center}
.add-field-row input,.add-field-row select{font-size:12px;padding:4px 8px;height:28px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
.add-field-row input{flex:1;min-width:80px}
.add-section-row{display:flex;gap:8px;align-items:center;margin-top:4px}
.add-section-row input{font-size:13px;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);flex:1}
.dragging{opacity:0.4}
.drop-indicator{background:var(--color-background-info);border:1px dashed #378ADD;border-radius:var(--border-radius-md)}
.json-area{margin-top:1rem;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px;font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary);max-height:160px;overflow-y:auto;white-space:pre;line-height:1.5}
.empty-msg{font-size:12px;color:var(--color-text-secondary);padding:8px 0;font-style:italic}
</style>

<h2 class="sr-only">Draggable character sheet with editable fields</h2>

  </div>

  <div class="section-list" id="section-list"><div class="section" data-sid="id_b0f0p05"><div class="section-header" draggable="true"><i class="ti ti-grip-vertical drag-handle" aria-hidden="true"></i><input class="section-title"><button class="delete-btn" title="Remove section"><i class="ti ti-x"></i></button></div><div class="field-list"><div class="field" draggable="true" data-fid="id_9ctlsyr"><i class="ti ti-grip-vertical field-handle" aria-hidden="true"></i><div class="field-inner"><span class="field-label">Name</span><input type="text" class="field-input" placeholder="—"></div><span class="field-type-badge">text</span><button class="delete-btn" title="Remove field"><i class="ti ti-x"></i></button></div><div class="field" draggable="true" data-fid="id_scgaril"><i class="ti ti-grip-vertical field-handle" aria-hidden="true"></i><div class="field-inner"><span class="field-label">Class</span><input type="text" class="field-input" placeholder="—"></div><span class="field-type-badge">text</span><button class="delete-btn" title="Remove field"><i class="ti ti-x"></i></button></div><div class="field" draggable="true" data-fid="id_oc44f9v"><i class="ti ti-grip-vertical field-handle" aria-hidden="true"></i><div class="field-inner"><span class="field-label">Level</span><input type="number" class="field-input" placeholder="0"></div><span class="field-type-badge">number</span><button class="delete-btn" title="Remove field"><i class="ti ti-x"></i></button></div></div><div class="add-field-row"><input placeholder="Field label…"><select><option value="text">text</option><option value="number">number</option><option value="textarea">textarea</option><option value="checkbox">checkbox</option></select><button><i class="ti ti-plus" aria-hidden="true"></i></button></div></div><div class="section" data-sid="id_idumc1b"><div class="section-header" draggable="true"><i class="ti ti-grip-vertical drag-handle" aria-hidden="true"></i><input class="section-title"><button class="delete-btn" title="Remove section"><i class="ti ti-x"></i></button></div><div class="field-list"><div class="field" draggable="true" data-fid="id_6ha2fsw"><i class="ti ti-grip-vertical field-handle" aria-hidden="true"></i><div class="field-inner"><span class="field-label">HP</span><input type="number" class="field-input" placeholder="0"></div><span class="field-type-badge">number</span><button class="delete-btn" title="Remove field"><i class="ti ti-x"></i></button></div><div class="field" draggable="true" data-fid="id_ah6v9dj"><i class="ti ti-grip-vertical field-handle" aria-hidden="true"></i><div class="field-inner"><span class="field-label">AC</span><input type="number" class="field-input" placeholder="0"></div><span class="field-type-badge">number</span><button class="delete-btn" title="Remove field"><i class="ti ti-x"></i></button></div><div class="field" draggable="true" data-fid="id_j2fowb7"><i class="ti ti-grip-vertical field-handle" aria-hidden="true"></i><div class="field-inner"><span class="field-label">Speed</span><input type="text" class="field-input" placeholder="—"></div><span class="field-type-badge">text</span><button class="delete-btn" title="Remove field"><i class="ti ti-x"></i></button></div></div><div class="add-field-row"><input placeholder="Field label…"><select><option value="text">text</option><option value="number">number</option><option value="textarea">textarea</option><option value="checkbox">checkbox</option></select><button><i class="ti ti-plus" aria-hidden="true"></i></button></div></div><div class="section" data-sid="id_bquqykp"><div class="section-header" draggable="true"><i class="ti ti-grip-vertical drag-handle" aria-hidden="true"></i><input class="section-title"><button class="delete-btn" title="Remove section"><i class="ti ti-x"></i></button></div><div class="field-list"><div class="field" draggable="true" data-fid="id_1ga1azs"><i class="ti ti-grip-vertical field-handle" aria-hidden="true"></i><div class="field-inner"><span class="field-label">Wisdom</span><input type="number" class="field-input" placeholder="0"></div><span class="field-type-badge">number</span><button class="delete-btn" title="Remove field"><i class="ti ti-x"></i></button></div><div class="field" draggable="true" data-fid="id_3utwer3"><i class="ti ti-grip-vertical field-handle" aria-hidden="true"></i><div class="field-inner"><span class="field-label">Charisma</span><input type="number" class="field-input" placeholder="0"></div><span class="field-type-badge">number</span><button class="delete-btn" title="Remove field"><i class="ti ti-x"></i></button></div><div class="field" draggable="true" data-fid="id_wjwqhp3"><i class="ti ti-grip-vertical field-handle" aria-hidden="true"></i><div class="field-inner"><span class="field-label">check</span><input type="checkbox" class="field-input"></div><span class="field-type-badge">checkbox</span><button class="delete-btn" title="Remove field"><i class="ti ti-x"></i></button></div></div><div class="add-field-row"><input placeholder="Field label…"><select><option value="text">text</option><option value="number">number</option><option value="textarea">textarea</option><option value="checkbox">checkbox</option></select><button><i class="ti ti-plus" aria-hidden="true"></i></button></div></div><div class="section" data-sid="id_unk0bjp"><div class="section-header" draggable="true"><i class="ti ti-grip-vertical drag-handle" aria-hidden="true"></i><input class="section-title"><button class="delete-btn" title="Remove section"><i class="ti ti-x"></i></button></div><div class="field-list"><div class="field" draggable="true" data-fid="id_99ak8n5"><i class="ti ti-grip-vertical field-handle" aria-hidden="true"></i><div class="field-inner"><span class="field-label">backpack</span><textarea class="field-textarea" rows="2"></textarea></div><span class="field-type-badge">textarea</span><button class="delete-btn" title="Remove field"><i class="ti ti-x"></i></button></div></div><div class="add-field-row"><input placeholder="Field label…"><select><option value="text">text</option><option value="number">number</option><option value="textarea">textarea</option><option value="checkbox">checkbox</option></select><button><i class="ti ti-plus" aria-hidden="true"></i></button></div></div></div>

  <div class="add-section-row" style="margin-top:12px">
    <input id="new-section-name" placeholder="New section name…">
    <button id="btn-add-section"><i class="ti ti-plus" aria-hidden="true"></i> Add section</button>
  </div>

  <div class="json-area" id="json-preview" style="display:none"></div>
</div>

<script>
const idRegistry = new Set();

function genId() {
  let id;
  do { id = "id_" + Math.random().toString(36).slice(2, 9); }
  while (idRegistry.has(id));
  idRegistry.add(id);
  return id;
}

function registerIds(sheet) {
  idRegistry.clear();
  const seen = new Set();
  for (const sec of sheet.sections) {
    if (seen.has(sec.id)) sec.id = genId();
    else { seen.add(sec.id); idRegistry.add(sec.id); }
    for (const field of sec.fields) {
      if (seen.has(field.id)) field.id = genId();
      else { seen.add(field.id); idRegistry.add(field.id); }
    }
  }
}

function releaseId(id) { idRegistry.delete(id); }

let sheet = {
  meta: { name: "My Character", system: "Custom", version: "1" },
  sections: [
    { id: null, label: "Basics", fields: [
      { id: null, label: "Name",  type: "text",   value: "" },
      { id: null, label: "Class", type: "text",   value: "" },
      { id: null, label: "Level", type: "number", value: "1" }
    ]},
    { id: null, label: "Ability scores", fields: [
      { id: null, label: "Strength",     type: "number", value: "10" },
      { id: null, label: "Dexterity",    type: "number", value: "10" },
      { id: null, label: "Constitution", type: "number", value: "10" },
      { id: null, label: "Intelligence", type: "number", value: "10" },
      { id: null, label: "Wisdom",       type: "number", value: "10" },
      { id: null, label: "Charisma",     type: "number", value: "10" }
    ]},
    { id: null, label: "Combat", fields: [
      { id: null, label: "HP",    type: "number", value: "" },
      { id: null, label: "AC",    type: "number", value: "" },
      { id: null, label: "Speed", type: "text",   value: "30ft" }
    ]}
  ]
};

for (const sec of sheet.sections) {
  sec.id = genId();
  for (const field of sec.fields) field.id = genId();
}

let dragSrc = null, dragType = null, dragSrcSection = null;

function makeFieldInput(field) {
  if (field.type === "textarea") {
    const ta = document.createElement("textarea");
    ta.className = "field-textarea";
    ta.value = field.value || "";
    ta.rows = 2;
    ta.addEventListener("input", e => { field.value = e.target.value; updatePreview(); });
    ta.addEventListener("mousedown", e => e.stopPropagation());
    return ta;
  }
  if (field.type === "checkbox") {
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.className = "field-input";
    cb.checked = field.value === true || field.value === "true";
    cb.addEventListener("change", e => { field.value = e.target.checked; updatePreview(); });
    cb.addEventListener("mousedown", e => e.stopPropagation());
    return cb;
  }
  const inp = document.createElement("input");
  inp.type = field.type === "number" ? "number" : "text";
  inp.className = "field-input";
  inp.value = field.value || "";
  inp.placeholder = field.type === "number" ? "0" : "—";
  inp.addEventListener("input", e => { field.value = e.target.value; updatePreview(); });
  // prevent drag from firing when clicking into the input
  inp.addEventListener("mousedown", e => e.stopPropagation());
  return inp;
}

function render() {
  const list = document.getElementById("section-list");
  list.innerHTML = "";

  sheet.sections.forEach((sec, si) => {
    const secEl = document.createElement("div");
    secEl.className = "section";
    secEl.dataset.sid = sec.id;

    const hdr = document.createElement("div");
    hdr.className = "section-header";
    hdr.draggable = true;
    hdr.innerHTML = `<i class="ti ti-grip-vertical drag-handle" aria-hidden="true"></i>`;

    const titleInp = document.createElement("input");
    titleInp.className = "section-title";
    titleInp.value = sec.label;
    titleInp.addEventListener("mousedown", e => e.stopPropagation());
    titleInp.addEventListener("input", e => { sec.label = e.target.value; updatePreview(); });
    hdr.appendChild(titleInp);

    const delBtn = document.createElement("button");
    delBtn.className = "delete-btn";
    delBtn.title = "Remove section";
    delBtn.innerHTML = `<i class="ti ti-x"></i>`;
    delBtn.addEventListener("click", () => {
      releaseId(sec.id);
      sec.fields.forEach(f => releaseId(f.id));
      sheet.sections.splice(si, 1);
      render(); updatePreview();
    });
    hdr.appendChild(delBtn);

    hdr.addEventListener("dragstart", e => {
      dragType = "section"; dragSrc = sec.id;
      setTimeout(() => secEl.classList.add("dragging"), 0);
      e.dataTransfer.effectAllowed = "move";
    });
    hdr.addEventListener("dragend", () => { secEl.classList.remove("dragging"); clearDropIndicators(); });
    secEl.addEventListener("dragover", e => {
      if (dragType !== "section") return;
      e.preventDefault(); e.dataTransfer.dropEffect = "move";
      clearDropIndicators(); secEl.classList.add("drop-indicator");
    });
    secEl.addEventListener("dragleave", () => secEl.classList.remove("drop-indicator"));
    secEl.addEventListener("drop", e => {
      e.preventDefault();
      if (dragType !== "section" || dragSrc === sec.id) return;
      const fromIdx = sheet.sections.findIndex(s => s.id === dragSrc);
      const [moved] = sheet.sections.splice(fromIdx, 1);
      sheet.sections.splice(si, 0, moved);
      render(); updatePreview();
    });

    const fieldList = document.createElement("div");
    fieldList.className = "field-list";

    if (sec.fields.length === 0) {
      const em = document.createElement("div");
      em.className = "empty-msg";
      em.textContent = "No fields yet — add one below.";
      fieldList.appendChild(em);
    }

    sec.fields.forEach((field, fi) => {
      const fEl = document.createElement("div");
      fEl.className = "field"; fEl.draggable = true; fEl.dataset.fid = field.id;

      const handle = document.createElement("i");
      handle.className = "ti ti-grip-vertical field-handle";
      handle.setAttribute("aria-hidden","true");

      const inner = document.createElement("div");
      inner.className = "field-inner";

      const lbl = document.createElement("span");
      lbl.className = "field-label";
      lbl.textContent = field.label;

      const inputEl = makeFieldInput(field);

      inner.appendChild(lbl);
      inner.appendChild(inputEl);

      const badge = document.createElement("span");
      badge.className = "field-type-badge";
      badge.textContent = field.type;

      const delF = document.createElement("button");
      delF.className = "delete-btn";
      delF.title = "Remove field";
      delF.innerHTML = `<i class="ti ti-x"></i>`;
      delF.addEventListener("click", e => {
        e.stopPropagation();
        releaseId(field.id);
        sec.fields.splice(fi, 1);
        render(); updatePreview();
      });

      fEl.appendChild(handle);
      fEl.appendChild(inner);
      fEl.appendChild(badge);
      fEl.appendChild(delF);

      fEl.addEventListener("dragstart", e => {
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
        dragType = "field"; dragSrc = field.id; dragSrcSection = sec.id;
        setTimeout(() => fEl.classList.add("dragging"), 0);
        e.dataTransfer.effectAllowed = "move";
        e.stopPropagation();
      });
      fEl.addEventListener("dragend", () => { fEl.classList.remove("dragging"); clearDropIndicators(); });
      fEl.addEventListener("dragover", e => {
        if (dragType !== "field") return;
        e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect = "move";
        clearDropIndicators(); fEl.classList.add("drop-indicator");
      });
      fEl.addEventListener("dragleave", () => fEl.classList.remove("drop-indicator"));
      fEl.addEventListener("drop", e => {
        e.preventDefault(); e.stopPropagation();
        if (dragType !== "field" || dragSrc === field.id) return;
        const srcSec = sheet.sections.find(s => s.id === dragSrcSection);
        const fromIdx = srcSec.fields.findIndex(f => f.id === dragSrc);
        const [moved] = srcSec.fields.splice(fromIdx, 1);
        const toIdx = sec.fields.findIndex(f => f.id === field.id);
        sec.fields.splice(toIdx, 0, moved);
        render(); updatePreview();
      });

      fieldList.appendChild(fEl);
    });

    fieldList.addEventListener("dragover", e => { if (dragType === "field") e.preventDefault(); });
    fieldList.addEventListener("drop", e => {
      e.preventDefault();
      if (dragType !== "field") return;
      const srcSec = sheet.sections.find(s => s.id === dragSrcSection);
      if (!srcSec) return;
      const fromIdx = srcSec.fields.findIndex(f => f.id === dragSrc);
      if (fromIdx === -1) return;
      const [moved] = srcSec.fields.splice(fromIdx, 1);
      sec.fields.push(moved);
      dragSrcSection = sec.id;
      render(); updatePreview();
    });

    const addRow = document.createElement("div");
    addRow.className = "add-field-row";

    const labelInp = document.createElement("input");
    labelInp.placeholder = "Field label…";

    const typeSelect = document.createElement("select");
    ["text","number","textarea","checkbox"].forEach(t => {
      const opt = document.createElement("option");
      opt.value = t; opt.textContent = t;
      typeSelect.appendChild(opt);
    });

    const addBtn = document.createElement("button");
    addBtn.innerHTML = `<i class="ti ti-plus" aria-hidden="true"></i>`;
    addBtn.addEventListener("click", () => {
      const label = labelInp.value.trim();
      if (!label) return;
      sec.fields.push({ id: genId(), label, type: typeSelect.value, value: "" });
      labelInp.value = "";
      render(); updatePreview();
    });
    labelInp.addEventListener("keydown", e => { if (e.key === "Enter") addBtn.click(); });

    addRow.appendChild(labelInp);
    addRow.appendChild(typeSelect);
    addRow.appendChild(addBtn);

    secEl.appendChild(hdr);
    secEl.appendChild(fieldList);
    secEl.appendChild(addRow);
    list.appendChild(secEl);
  });

  updatePreview();
}

function clearDropIndicators() {
  document.querySelectorAll(".drop-indicator").forEach(el => el.classList.remove("drop-indicator"));
}

document.getElementById("btn-add-section").addEventListener("click", () => {
  const inp = document.getElementById("new-section-name");
  const label = inp.value.trim() || "New section";
  sheet.sections.push({ id: genId(), label, fields: [] });
  inp.value = ""; render();
});

document.getElementById("new-section-name").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("btn-add-section").click();
});

document.getElementById("btn-save").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(sheet, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "character-sheet.json"; a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("btn-load-trigger").addEventListener("click", () => {
  document.getElementById("file-input").click();
});

document.getElementById("file-input").addEventListener("change", e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!parsed.sections) { alert("Invalid character sheet JSON."); return; }
      registerIds(parsed); sheet = parsed; render();
    } catch { alert("Could not parse JSON file."); }
  };
  reader.readAsText(file);
});

let previewVisible = false;
document.getElementById("btn-preview").addEventListener("click", () => {
  previewVisible = !previewVisible;
  const el = document.getElementById("json-preview");
  const btn = document.getElementById("btn-preview");
  el.style.display = previewVisible ? "block" : "none";
  btn.innerHTML = previewVisible
    ? `<i class="ti ti-code" aria-hidden="true"></i> Hide JSON`
    : `<i class="ti ti-code" aria-hidden="true"></i> Show JSON`;
  updatePreview();
});

function updatePreview() {
  if (!previewVisible) return;
  document.getElementById("json-preview").textContent = JSON.stringify(sheet, null, 2);
}

render();
</script>
</div>
