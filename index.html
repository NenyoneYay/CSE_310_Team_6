<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <title>GnollPointer</title>
    <link rel="icon" type="image/x-icon" href="images/pointer_clearbackground_icon.ico">
</head>
<body>
    <header>
        <img src="images/gnollpointer_clearbackground_icon.png" alt="GnollPointer Logo" id="logo">
        <h2 id="logo-text">GnollPointer</h2>
        <nav id="menu">
            <a href="index.html" class="active">Dashboard</a>
            <a href="character.html">Characters</a>
        </nav>
    </header>

    <main id="dashboard">
        <!-- Quick Welcome & Stats Bar -->
        <section id="welcome-banner">
            <h1>Welcome Back, Adventurer</h1>
            <p>Manage your heroes, track active campaigns, and reference core rules.</p>
        </section>

        <!-- Quick Actions Grid -->
        <section id="quick-actions">
            <h2>Quick Actions</h2>
            <div class="action-buttons">
                <button type="button" id="btn-create-char">New Character</button>
            </div>
        </section>

        <!-- User's Characters Section -->
        <section id="character-summary">
            <div class="section-header">
                <h2>Your Characters</h2>
                <a href="character.html" class="view-all">View All</a>
            </div>
            <div class="card-grid">
                <!-- Character Card 1 -->
                <article class="character-card">
                    <div class="char-avatar"></div>
                    <div class="char-info"></div>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 GnollPointer</p>
    </footer>
</body>
</html>
