
<html>
    <head>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.42.0/dist/tabler-icons.min.css" media="all" onload="this.media='all'">
        <style>
            :root {
            color-scheme: light dark;
            --font-serif: "Anthropic Serif", Georgia, "Times New Roman", serif;
            }
            * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            }
            input,
            select,
            textarea,
            button {
            font-family: inherit;
            }
            body {
            font-family:
                "Anthropic Sans",
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
            background: transparent;
            }
            /* Iframe height is externally managed — host sets iframe.style.height to
            * match body.getBoundingClientRect().height via postMessage. During the
            * 1-frame lag (and the 0.25s initial transition), body > viewport triggers
            * a transient scrollbar that steals ~15px width, reflowing flex content.
            * Zero-width scrollbar = zero layout shift. Wheel/keyboard scroll still
            * work if ever needed. */
            html,
            body {
            scrollbar-width: none;
            }
            html::-webkit-scrollbar,
            body::-webkit-scrollbar {
            width: 0;
            height: 0;
            }
            /* Short var aliases — saves ~5 tokens per reference */
            :root {
            --p: var(--color-text-primary);
            --s: var(--color-text-secondary);
            --t: var(--color-text-tertiary);
            --bg2: var(--color-background-secondary);
            --b: var(--color-border-secondary);
            }

            /* SVG utility classes — use class="t" instead of repeating font/fill attrs */
            .t {
            font-size: 14px;
            fill: var(--p);
            }
            .ts {
            font-size: 12px;
            fill: var(--s);
            }
            .th {
            font-size: 14px;
            fill: var(--p);
            font-weight: 500;
            }
            .box {
            fill: var(--bg2);
            stroke: var(--b);
            }
            .arr {
            stroke: var(--t);
            fill: none;
            stroke-width: 1.5;
            }
            .node {
            cursor: pointer;
            }
            .node:hover rect,
            .node:hover .box {
            filter: brightness(0.97);
            }
            .node:hover text {
            opacity: 0.8;
            }

            /* Form element defaults — model writes bare <input>, styling is automatic */
            /* :not(form.elicit *) — elicitation form provides its own
            * input/button styling at (0,1,0). Without this exclusion, these
            * generic rules at (0,3,1) / (1,0,2) clobber every .elicit-* class. */
            input:not([type="range"]):not([type="checkbox"]):not([type="radio"]):not(
                form.elicit *
            ),
            select:not(form.elicit *),
            textarea:not(form.elicit *) {
            width: 100%;
            height: 36px;
            padding: 8px 12px;
            font-size: 16px;
            background: var(--color-background-primary);
            color: var(--color-text-primary);
            border: 0.5px solid var(--color-border-tertiary);
            border-radius: 6px;
            outline: none;
            transition:
                border-color 0.15s,
                box-shadow 0.15s;
            }
            textarea {
            height: auto;
            min-height: 80px;
            resize: vertical;
            }
            input:not([type="range"]):not([type="checkbox"]):not([type="radio"]):not(
                form.elicit *
            ):hover,
            select:not(form.elicit *):hover,
            textarea:not(form.elicit *):hover {
            border-color: var(--color-border-secondary);
            }
            input:not([type="range"]):not([type="checkbox"]):not([type="radio"]):not(
                form.elicit *
            ):focus,
            select:not(form.elicit *):focus,
            textarea:not(form.elicit *):focus {
            border-color: var(--color-border-info);
            box-shadow: 0 0 0 3px var(--color-background-info);
            }
            select {
            cursor: pointer;
            }

            /* Range slider — model writes bare <input type="range">, styling automatic */
            input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: light-dark(rgba(0, 0, 0, 0.08), rgba(255, 255, 255, 0.1));
            border-radius: 2px;
            outline: none;
            }
            input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--color-background-primary);
            border: 1px solid var(--color-border-secondary);
            cursor: pointer;
            transition:
                border-color 0.15s,
                transform 0.15s;
            }
            input[type="range"]:hover::-webkit-slider-thumb {
            border-color: var(--color-border-primary);
            transform: scale(1.1);
            }
            input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--color-background-primary);
            border: 1px solid var(--color-border-secondary);
            cursor: pointer;
            }

            /* Button defaults — model writes bare <button>, interaction states automatic */
            button:not(#action-btns button):not(form.elicit button) {
            padding: 8px 16px;
            font-size: 14px;
            background: transparent;
            color: var(--color-text-primary);
            border: 0.5px solid var(--color-border-secondary);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            transition:
                background 0.15s,
                transform 0.1s;
            }
            button:not(#action-btns button):not(form.elicit button):hover {
            background: var(--color-background-secondary);
            }
            button:not(#action-btns button):not(form.elicit button):active {
            background: var(--color-border-tertiary);
            transform: scale(0.98);
            }

            /* ===== Elicitation form — EA-878 =====
            * Inert unless Claude writes <form class="elicit">.
            * Figma: AaGSDTRrOCNVhNa7LZaJVr node 5340:3930
            * Conversational question prompts ("Which side are you on?"),
            * pills for all choices.
            */

            form.elicit {
            background: var(--color-background-primary, #fff);
            border: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
            border-radius: 16px;
            /* Figma 5340:3930 — soft diffuse shadow, lighter than DS --shadow-md.
            * Margin keeps the shadow from clipping at #vis-container's overflow:hidden
            * edge: y-offset 4px + blur 20px ≈ 24px below, 20px sides. */
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.04);
            margin: 4px 20px 24px;
            overflow: hidden;
            /* font-base = 14/1.4 sans — descendants inherit; only .elicit-question
            * (serif 16/1.5), .name (12), .badge (9) override. */
            font-family: var(--font-sans, system-ui, sans-serif);
            font-size: 14px;
            line-height: 1.4;
            /* Match host rendering — without this the iframe uses subpixel AA and
            * everything (notably weight-500 buttons) reads ~100 heavier on Retina
            * than the same tokens outside the iframe. */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* Chrome props animate on the form→submitted-summary swap. */
            transition:
                background-color 200ms ease-out,
                box-shadow 200ms ease-out,
                border-radius 200ms ease-out,
                padding 200ms ease-out,
                margin 200ms ease-out;
            /* Shared FileThumbnail tokens (border-border-300/25, shadow-sm/5). */
            --elicit-border-faint: color-mix(
                in srgb,
                var(--color-border-tertiary, rgba(31, 30, 29, 0.15)) 25%,
                transparent
            );
            --elicit-shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            }
            /* Form controls don't inherit font props from the UA sheet — pull from root.
            * `font: inherit` shorthand so font-weight comes too; the individual-prop
            * version left weight at the UA <button> default (bold-ish on some
            * platforms) for any control that doesn't set its own weight. */
            form.elicit :is(button, input, textarea) {
            font: inherit;
            }

            /* Header title and question prompts share Claude's chat-output voice —
            * must track the p.font-claude-response-body composite (Anthropic Serif
            * 16 / 400 / 1.5) so both read as Claude speaking, not form chrome. */
            form.elicit .elicit-header,
            form.elicit .elicit-question {
            font-family: var(--font-serif, "Anthropic Serif", Georgia, serif);
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            color: var(--color-text-primary, #131313);
            }

            /* 44px total to match the suggested-connector widget spec.
            * Fixed height + zero vertical padding lets align-items:center handle the rest;
            * avoids the icon/text line-height arithmetic. */
            form.elicit .elicit-header {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 44px;
            padding: 0 16px;
            border-bottom: 0.5px solid
                var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
            }
            form.elicit .elicit-header > svg {
            /* IconBase vectorSizeMap[16] = 20 — anthropicons render in a 20px box. */
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            fill: currentColor;
            }
            form.elicit .elicit-header > span {
            flex: 1;
            }

            form.elicit .elicit-body {
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            }

            form.elicit .elicit-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            }

            form.elicit .elicit-question {
            margin: 0;
            }

            /* Pills container — no horizontal padding. Previously had 0 8px which pushed
            * pills 8px right of the question/textarea/date in the same .elicit-group. */
            form.elicit .elicit-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            }
            form.elicit .elicit-pill {
            /* Fully rounded + tighter padding — visually distinct from the rectangular
            * text inputs (textarea/other/date stay at 8-12px radius). Pills and inputs
            * don't match in height so the shape difference reads as intentional. */
            padding: 8px 12px;
            border: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
            border-radius: 9999px;
            background: transparent;
            color: var(--color-text-secondary, #383835);
            cursor: pointer;
            transition:
                border-color 120ms ease,
                background-color 120ms ease;
            }
            form.elicit .elicit-pill:hover {
            border-color: var(--color-border-secondary, rgba(30, 30, 29, 0.3));
            }
            /* Semantic accents — same light-fill+soft-border recipe as the blue selected
            * state, applied via attribute so inline style doesn't fight aria-pressed.
            * Single-attr specificity; the [aria-pressed="true"] rule below wins on
            * border+bg so selection remains visible on accented pills. */
            form.elicit .elicit-pill[data-accent="warning"] {
            border-color: var(--color-text-warning, #5a4815);
            background: color-mix(
                in srgb,
                var(--color-text-warning, #5a4815) 15%,
                transparent
            );
            color: var(--color-text-warning, #5a4815);
            }
            form.elicit .elicit-pill[data-accent="danger"] {
            border-color: var(--color-text-danger, #7f2c28);
            background: color-mix(
                in srgb,
                var(--color-text-danger, #7f2c28) 15%,
                transparent
            );
            color: var(--color-text-danger, #7f2c28);
            }
            form.elicit .elicit-pill[data-accent="success"] {
            border-color: var(--color-text-success, #265b19);
            background: color-mix(
                in srgb,
                var(--color-text-success, #265b19) 15%,
                transparent
            );
            color: var(--color-text-success, #265b19);
            }
            form.elicit .elicit-pill[aria-pressed="true"] {
            /* Figma: 0.5px #184f95 border + rgba(205,226,251,0.5) fill (approx via color-mix). */
            border: 0.5px solid var(--color-text-info, #184f95);
            background: color-mix(
                in srgb,
                var(--color-text-info, #184f95) 15%,
                transparent
            );
            /* accent-000 — host bridge maps DS accent to --color-text-info (no
            * --accent-* var injected into the iframe). Matches border + fill. */
            color: var(--color-text-info, #184f95);
            }

            /* "Other" conditional text input.
            * background/color explicit — generic input rule no longer provides
            * these post-specificity-fix, UA Canvas/CanvasText mismatch in dark mode. */
            form.elicit .elicit-other {
            margin-top: 8px;
            height: 40px;
            padding: 0 12px;
            border: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
            border-radius: 8px;
            background: var(--color-background-primary, #fff);
            color: var(--color-text-primary, #131313);
            width: 100%;
            box-sizing: border-box;
            }
            form.elicit .elicit-other[hidden] {
            display: none;
            }

            /* Textarea.
            * background/color explicit — generic textarea rule no longer provides
            * these post-specificity-fix, UA Canvas/CanvasText mismatch in dark mode. */
            form.elicit .elicit-textarea {
            min-height: 84px;
            padding: 12px;
            border: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
            border-radius: 8px;
            background: var(--color-background-primary, #fff);
            color: var(--color-text-primary, #131313);
            resize: vertical;
            box-sizing: border-box;
            width: 100%;
            }
            form.elicit .elicit-textarea::placeholder {
            color: var(--color-text-tertiary, #7b7974);
            }

            /* Date input — pill-shaped, hugs content */
            form.elicit .elicit-date {
            padding: 12px 16px;
            border: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
            border-radius: 12px;
            background: transparent;
            color: var(--color-text-primary, #131313);
            width: fit-content;
            cursor: pointer;
            }
            /* Shared focus ring for all text inputs — info-blue border + soft glow */
            form.elicit .elicit-other:focus,
            form.elicit .elicit-textarea:focus,
            form.elicit .elicit-date:focus {
            outline: none;
            border-color: var(--color-border-info, #2a78d6);
            box-shadow: 0 0 0 3px var(--color-background-info, rgba(42, 120, 214, 0.2));
            }

            /* File upload — dashed dropzone + filled tiles.
            * Tile styling mirrors packages/chat/components/FileThumbnail.tsx (the
            * thumbnail users already see in the chat input row) so a file picked here
            * reads as the same object it becomes once attached. Dropzone is the first
            * flex child; tiles append after it (flow right). */
            form.elicit .elicit-files {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 12px;
            }
            form.elicit .elicit-dropzone {
            /* 120×120 = FileThumbnail SIZE_MAP.normal. Dashed stays 1px — 0.5px
            * dashed rasterizes to invisible gaps on non-retina. */
            width: 120px;
            height: 120px;
            border: 1px dashed var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
            border-radius: 10px;
            box-shadow: var(--elicit-shadow-sm);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            /* Figma 5340:4071 — 2% text-000 wash over bg-000 */
            background: color-mix(
                in srgb,
                var(--color-text-primary, #131313) 2%,
                var(--color-background-primary, #fff)
            );
            color: var(--color-text-tertiary, #7b7974);
            transition:
                border-color 120ms ease,
                background-color 120ms ease;
            }
            form.elicit .elicit-dropzone:hover {
            border-color: var(--color-text-info, #184f95);
            background: color-mix(
                in srgb,
                var(--color-text-info, #184f95) 4%,
                transparent
            );
            }
            form.elicit .elicit-dropzone svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            }
            form.elicit .elicit-dropzone input[type="file"] {
            display: none;
            }

            form.elicit .elicit-file-tile {
            /* FileThumbnail ThumbnailInteractionContainer:
            * rounded-lg border-0.5 border-border-300/25 shadow-sm shadow-always-black/5
            * bg-bg-000 px-2.5 py-2 gap-2.5 → 8px radius, 0.5px border, 8/10px pad */
            width: 120px;
            height: 120px;
            border: 0.5px solid var(--elicit-border-faint);
            border-radius: 8px;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 10px;
            background: var(--color-background-primary, #fff);
            box-shadow: var(--elicit-shadow-sm);
            box-sizing: border-box;
            position: relative;
            }
            form.elicit .elicit-file-tile .name {
            /* FileThumbnail title: text-[12px] text-text-100 break-words line-clamp-3 */
            font-size: 12px;
            color: var(--color-text-primary, #131313);
            word-break: break-word;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            }
            form.elicit .elicit-file-tile .badge {
            /* FileThumbnail ThumbnailTagContainer:
            * h-[18px] px-1 border-0.5 border-border-300/25 shadow-sm rounded
            * bg-bg-000/70 font-medium + inner text-[9px] uppercase font-bold */
            align-self: flex-start;
            height: 18px;
            padding: 0 4px;
            display: inline-flex;
            align-items: center;
            border: 0.5px solid var(--elicit-border-faint);
            border-radius: 4px;
            background: color-mix(
                in srgb,
                var(--color-background-primary, #fff) 70%,
                transparent
            );
            box-shadow: var(--elicit-shadow-sm);
            font-size: 9px;
            font-weight: 700;
            color: var(--color-text-tertiary, #7b7974);
            text-transform: uppercase;
            }
            /* FileThumbnail RemoveButton: w-5 h-5 -top-2 -left-2 rounded-full
            * border-0.5 border-border-300/25 bg-bg-000/90 backdrop-blur-sm.
            * Always visible (no group-hover in iframe — touch + no Tailwind group). */
            form.elicit .elicit-file-tile .remove {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 20px;
            height: 20px;
            padding: 0;
            border: 0.5px solid var(--elicit-border-faint);
            border-radius: 9999px;
            background: color-mix(
                in srgb,
                var(--color-background-primary, #fff) 90%,
                transparent
            );
            backdrop-filter: blur(4px);
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            color: var(--color-text-tertiary, #7b7974);
            display: flex;
            align-items: center;
            justify-content: center;
            transition:
                color 120ms ease,
                background-color 120ms ease;
            }
            form.elicit .elicit-file-tile .remove:hover {
            color: var(--color-text-secondary, #383835);
            background: color-mix(
                in srgb,
                var(--color-background-primary, #fff) 50%,
                transparent
            );
            }

            /* Footer — DS Button tokens transcribed (variant=secondary / variant=primary,
            * size=default: h-9 px-4 rounded-lg min-w-[5rem] font-base-bold). */
            form.elicit .elicit-footer {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            /* Explicit height (mirrors .elicit-header) so the submitted-state height:0
            * transition can interpolate — auto→0 snaps. 36px buttons + 32px breathing room. */
            height: 68px;
            padding: 0 24px;
            border-top: 0.5px solid var(--color-border-tertiary, rgba(31, 30, 29, 0.15));
            }
            form.elicit .elicit-skip,
            form.elicit .elicit-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            min-width: 80px;
            padding: 0 16px;
            border-radius: 8px;
            /* DS Button primary/secondary = font-base-bold (tw-typography.js:26) */
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition:
                background-color 100ms ease-out,
                border-color 100ms ease-out,
                transform 150ms cubic-bezier(0.165, 0.85, 0.45, 1);
            }
            form.elicit .elicit-skip:active,
            form.elicit .elicit-submit:active {
            transform: scale(0.96);
            }
            /* secondary */
            form.elicit .elicit-skip {
            border: 0.5px solid
                color-mix(
                in srgb,
                var(--color-border-secondary, rgba(30, 30, 29, 0.3)) 30%,
                transparent
                );
            background: transparent;
            color: var(--color-text-primary, #131313);
            }
            form.elicit .elicit-skip:hover {
            background: var(--color-background-secondary, #f9f9f7);
            border-color: transparent;
            }
            /* primary */
            form.elicit .elicit-submit {
            border: none;
            background: var(--color-text-primary, #131313);
            color: var(--color-background-primary, #fff);
            }
            form.elicit .elicit-submit:hover {
            transform: scaleX(1.005) scaleY(1.015);
            }
            /* :hover and :active are both true during a mouse click; equal specificity →
            * source order wins, so without this the hover-grow above masks the press-down. */
            form.elicit .elicit-submit:hover:active {
            transform: scale(0.96);
            }

            /* Post-submit — submitElicitation() adds .elicit-transitioning (body fades
            * out), then after 150ms swaps the body for the Q/A summary and adds
            * .elicit-submitted (chrome transitions to the bare card while body fades
            * back in). Mirrors AskUserQuestion: outer card = AskUserQuestionToolUseCell
            * .tsx:177 (rounded-xl border-0.5 border-border-300 p-4, no bg-bg-000 when
            * submitted), rows = SubmittedResponses.tsx:14-36. */
            form.elicit .elicit-body {
            transition: opacity 150ms ease-out;
            }
            form.elicit.elicit-transitioning .elicit-body {
            opacity: 0;
            }
            form.elicit.elicit-submitted {
            background: transparent;
            border-radius: 12px;
            box-shadow: none;
            padding: 16px;
            margin: 4px;
            }
            /* `display: none` can't transition — collapse to zero so the chrome animates
            * away with the form's 200ms transition instead of snapping. */
            form.elicit .elicit-header,
            form.elicit .elicit-footer {
            transition:
                opacity 200ms ease-out,
                height 200ms ease-out,
                padding 200ms ease-out,
                border-width 200ms ease-out,
                /* step to hidden after the collapse so Skip/Submit leave the tab order +
                * a11y tree (pointer-events:none alone doesn't). */
                visibility 0s linear 200ms;
            }
            form.elicit.elicit-submitted .elicit-header,
            form.elicit.elicit-submitted .elicit-footer {
            opacity: 0;
            height: 0;
            padding-top: 0;
            padding-bottom: 0;
            border-width: 0;
            overflow: hidden;
            pointer-events: none;
            visibility: hidden;
            }
            form.elicit.elicit-submitted .elicit-body {
            padding: 0;
            }
            /* Quota-fallback "1" sentinel restore: shape check skips renderSubmittedSummary
            * so the body still has live inputs — dim them so the locked state reads. */
            form.elicit.elicit-submitted .elicit-body:not(:has(.elicit-summary)) {
            pointer-events: none;
            opacity: 0.5;
            }
            /* sessionStorage restore path adds this alongside .elicit-submitted so
            * scroll-back/reload shows the summary immediately (no replayed crossfade). */
            form.elicit.elicit-restored,
            form.elicit.elicit-restored .elicit-body,
            form.elicit.elicit-restored .elicit-header,
            form.elicit.elicit-restored .elicit-footer {

                --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
                --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
                --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            }
            *{
                box-sizing:border-box;
                margin:0;
                padding:0
            }
            body{
                font-family:var(--font-sans);
                color:var(--color-text-primary)
            }
            .sheet{
                padding:1rem 0
            }
            .toolbar{
                display:flex;
                gap:8px;
                margin-bottom:1rem;
                flex-wrap:wrap;
                align-items:center
            }
            .toolbar span{
                font-size:13px;
                color:var(--color-text-secondary);
                margin-right:4px
            }
            .section-list{
                display:flex;
                flex-direction:column;
                gap:12px
            }
            .section{
                background:var(--color-background-primary);
                border:0.5px solid var(--color-border-secondary);
                border-radius:var(--border-radius-lg);
                overflow:hidden
            }
            .section-header{
                display:flex;
                align-items:center;
                gap:8px;
                padding:10px 14px;
                background:var(--color-background-secondary);
                border-bottom:0.5px solid var(--color-border-tertiary);
                cursor:grab;
                user-select:none
            }
            .section-header:active{
                cursor:grabbing
            }
            .section-title{
                font-size:14px;
                font-weight:500;
                flex:1;
                background:transparent;
                border:none;
                color:var(--color-text-primary);
                font-family:var(--font-sans)
            }
            .section-title:focus{
                outline:none;
                border-bottom:1px solid var(--color-border-primary)
            }
            .drag-handle{
                color:var(--color-text-secondary);
                font-size:16px;
                cursor:grab
            }
            .field-list{
                display:flex;
                flex-wrap:wrap;
                gap:8px;
                padding:12px
            }
            .field{
                display:flex;
                align-items:center;
                gap:8px;
                background:var(--color-background-secondary);
                border:0.5px solid var(--color-border-tertiary);
                border-radius:var(--border-radius-md);
                padding:8px 10px;
                cursor:grab;
                user-select:none;
                min-width:150px;
                flex:1
            }
            .field:active{
                cursor:grabbing
            }
            .field-handle{
                color:var(--color-text-secondary);
                font-size:14px;
                flex-shrink:0
            }
            .field-inner{
                flex:1;
                display:flex;
                flex-direction:column;
                gap:4px;
                min-width:0
            }
            .field-label{
                font-size:11px;
                color:var(--color-text-secondary);
                font-weight:500;
                text-transform:uppercase;
                letter-spacing:0.04em
            }
            .field-input{
                font-size:13px;
                font-weight:500;
                background:transparent;
                border:none;
                border-bottom:0.5px solid transparent;
                color:var(--color-text-primary);
                font-family:var(--font-sans);
                width:100%;
                padding:0;
                cursor:text
            }
            .field-input:focus{
                outline:none;
                border-bottom-color:var(--color-border-primary)
            }
            .field-input[type=number]{
                -moz-appearance:textfield
            }
            .field-input[type=number]::-webkit-outer-spin-button,
            .field-input[type=number]::-webkit-inner-spin-button{
                -webkit-appearance:none
            }
            .field-input[type=checkbox]{
                width:16px;
                height:16px;
                cursor:pointer;
                accent-color:var(--color-text-info)
            }
            .field-textarea{
                font-size:13px;
                font-weight:500;
                background:transparent;
                border:none;
                border-bottom:0.5px solid transparent;
                color:var(--color-text-primary);
                font-family:var(--font-sans);
                width:100%;
                padding:0;
                cursor:text;
                resize:none;
                min-height:40px;
                line-height:1.4
            }
            .field-textarea:focus{
                outline:none;
                border-bottom-color:var(--color-border-primary)
            }
            .field-input:hover,.field-textarea:hover{
                border-bottom-color:var(--color-border-tertiary)
            }
            .field-type-badge{
                font-size:10px;
                padding:1px 6px;
                border-radius:10px;
                background:var(--color-background-primary);
                border:0.5px solid var(--color-border-tertiary);
                color:var(--color-text-secondary);
                flex-shrink:0
            }
            .delete-btn{
                background:none;
                border:none;
                color:var(--color-text-secondary);
                cursor:pointer;
                font-size:14px;
                padding:2px;
                line-height:1;
                opacity:0.4;
                flex-shrink:0
            }
            .delete-btn:hover{
                opacity:1;
                color:#E24B4A
            }
            .add-field-row{
                display:flex;
                gap:6px;
                padding:0 12px 10px;
                flex-wrap:wrap;
                align-items:center
            }
            .add-field-row input,.add-field-row select{
                font-size:12px;
                padding:4px 8px;
                height:28px;
                border-radius:var(--border-radius-md);
                border:0.5px solid var(--color-border-secondary);
                background:var(--color-background-primary);
                color:var(--color-text-primary);
                font-family:var(--font-sans)
            }
            .add-field-row input{
                flex:1;
                min-width:80px
            }
            .add-section-row{
                display:flex;
                gap:8px;
                align-items:center;
                margin-top:4px
            }
            .add-section-row input{
                font-size:13px;
                padding:6px 10px;
                border-radius:var(--border-radius-md);
                border:0.5px solid var(--color-border-secondary);
                background:var(--color-background-primary);
                color:var(--color-text-primary);
                font-family:var(--font-sans);
                flex:1
            }
            .dragging{
                opacity:0.4
            }
            .drop-indicator{
                background:var(--color-background-info);
                border:1px dashed #378ADD;
                border-radius:var(--border-radius-md)
            }
            .json-area{
                margin-top:1rem;
                background:var(--color-background-secondary);
                border:0.5px solid var(--color-border-tertiary);
                border-radius:var(--border-radius-md);
                padding:10px;
                font-family:var(--font-mono);
                font-size:11px;
                color:var(--color-text-secondary);
                max-height:160px;
                overflow-y:auto;
                white-space:pre;
                line-height:1.5
            }
            .empty-msg{
                font-size:12px;
                color:var(--color-text-secondary);
                padding:8px 0;
                font-style:italic
            }
        </style>
    </head>
    <body>
                
        <h2 class="sr-only">Draggable character sheet with editable fields</h2>

        <div class="sheet">
        <div class="toolbar">
            <span>Character sheet builder</span>
            <button id="btn-save"><i class="ti ti-download" aria-hidden="true"></i> Save JSON</button>
            <label style="cursor:pointer">
            <button id="btn-load-trigger"><i class="ti ti-upload" aria-hidden="true"></i> Load JSON</button>
            <input type="file" id="file-input" accept=".json" style="display:none">
            </label>
            <button id="btn-preview"><i class="ti ti-code" aria-hidden="true"></i> Show JSON</button>
        </div>

        <div class="section-list" id="section-list"></div>

        <div class="add-section-row" style="margin-top:12px">
            <input id="new-section-name" placeholder="New section name…">
            <button id="btn-add-section"><i class="ti ti-plus" aria-hidden="true"></i> Add section</button>
        </div>

        <div class="json-area" id="json-preview" style="display:none"></div>
        </div>

        <script>
        const idRegistry = new Set();

        function genId() {

        let id;
        do {
        id = "id_" + Math.random().toString(36).slice(2, 9); 
        }
        while (idRegistry.has(id));
        idRegistry.add(id);
        return id;

        }

        function registerIds(sheet) {

        idRegistry.clear();
        const seen = new Set();
        for (const sec of sheet.sections) {

            if (seen.has(sec.id)) sec.id = genId();
            else {
        seen.add(sec.id); idRegistry.add(sec.id); 
        }
            for (const field of sec.fields) {

            if (seen.has(field.id)) field.id = genId();
            else {
        seen.add(field.id); idRegistry.add(field.id); 
        }
            
        }
        
        }

        }

        function releaseId(id) {
        idRegistry.delete(id); 
        }

        let sheet = {

        meta: {
        name: "My Character", system: "Custom", version: "1" 
        },
        sections: [
            {
        id: null, label: "Basics", fields: [
            {
        id: null, label: "Name",  type: "text",   value: "" 
        },
            {
        id: null, label: "Class", type: "text",   value: "" 
        },
            {
        id: null, label: "Level", type: "number", value: "1" 
        }
            ]
        },
            {
        id: null, label: "Ability scores", fields: [
            {
        id: null, label: "Strength",     type: "number", value: "10" 
        },
            {
        id: null, label: "Dexterity",    type: "number", value: "10" 
        },
            {
        id: null, label: "Constitution", type: "number", value: "10" 
        },
            {
        id: null, label: "Intelligence", type: "number", value: "10" 
        },
            {
        id: null, label: "Wisdom",       type: "number", value: "10" 
        },
            {
        id: null, label: "Charisma",     type: "number", value: "10" 
        }
            ]
        },
            {
        id: null, label: "Combat", fields: [
            {
        id: null, label: "HP",    type: "number", value: "" 
        },
            {
        id: null, label: "AC",    type: "number", value: "" 
        },
            {
        id: null, label: "Speed", type: "text",   value: "30ft" 
        }
            ]
        }
        ]

        };

        for (const sec of sheet.sections) {

        sec.id = genId();
        for (const field of sec.fields) field.id = genId();

        }

        let dragSrc = null, dragType = null, dragSrcSection = null;

        function makeFieldInput(field) {

        if (field.type === "textarea") {

            const ta = document.createElement("textarea");
            ta.className = "field-textarea";
            ta.value = field.value || "";
            ta.rows = 2;
            ta.addEventListener("input", e => {
        field.value = e.target.value; updatePreview(); 
        });
            ta.addEventListener("mousedown", e => e.stopPropagation());
            return ta;
        
        }
        if (field.type === "checkbox") {

            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.className = "field-input";
            cb.checked = field.value === true || field.value === "true";
            cb.addEventListener("change", e => {
        field.value = e.target.checked; updatePreview(); 
        });
            cb.addEventListener("mousedown", e => e.stopPropagation());
            return cb;
        
        }
        const inp = document.createElement("input");
        inp.type = field.type === "number" ? "number" : "text";
        inp.className = "field-input";
        inp.value = field.value || "";
        inp.placeholder = field.type === "number" ? "0" : "—";
        inp.addEventListener("input", e => {
        field.value = e.target.value; updatePreview(); 
        });
        // prevent drag from firing when clicking into the input
        inp.addEventListener("mousedown", e => e.stopPropagation());
        return inp;

        }

        function render() {

        const list = document.getElementById("section-list");
        list.innerHTML = "";

        sheet.sections.forEach((sec, si) => {

            const secEl = document.createElement("div");
            secEl.className = "section";
            secEl.dataset.sid = sec.id;

            const hdr = document.createElement("div");
            hdr.className = "section-header";
            hdr.draggable = true;
            hdr.innerHTML = `<i class="ti ti-grip-vertical drag-handle" aria-hidden="true"></i>`;

            const titleInp = document.createElement("input");
            titleInp.className = "section-title";
            titleInp.value = sec.label;
            titleInp.addEventListener("mousedown", e => e.stopPropagation());
            titleInp.addEventListener("input", e => {
        sec.label = e.target.value; updatePreview(); 
        });
            hdr.appendChild(titleInp);

            const delBtn = document.createElement("button");
            delBtn.className = "delete-btn";
            delBtn.title = "Remove section";
            delBtn.innerHTML = `<i class="ti ti-x"></i>`;
            delBtn.addEventListener("click", () => {

            releaseId(sec.id);
            sec.fields.forEach(f => releaseId(f.id));
            sheet.sections.splice(si, 1);
            render(); updatePreview();
            
        });
            hdr.appendChild(delBtn);

            hdr.addEventListener("dragstart", e => {

            dragType = "section"; dragSrc = sec.id;
            setTimeout(() => secEl.classList.add("dragging"), 0);
            e.dataTransfer.effectAllowed = "move";
            
        });
            hdr.addEventListener("dragend", () => {
        secEl.classList.remove("dragging"); clearDropIndicators(); 
        });
            secEl.addEventListener("dragover", e => {

            if (dragType !== "section") return;
            e.preventDefault(); e.dataTransfer.dropEffect = "move";
            clearDropIndicators(); secEl.classList.add("drop-indicator");
            
        });
            secEl.addEventListener("dragleave", () => secEl.classList.remove("drop-indicator"));
            secEl.addEventListener("drop", e => {

            e.preventDefault();
            if (dragType !== "section" || dragSrc === sec.id) return;
            const fromIdx = sheet.sections.findIndex(s => s.id === dragSrc);
            const [moved] = sheet.sections.splice(fromIdx, 1);
            sheet.sections.splice(si, 0, moved);
            render(); updatePreview();
            
        });

            const fieldList = document.createElement("div");
            fieldList.className = "field-list";

            if (sec.fields.length === 0) {

            const em = document.createElement("div");
            em.className = "empty-msg";
            em.textContent = "No fields yet — add one below.";
            fieldList.appendChild(em);
            
        }

            sec.fields.forEach((field, fi) => {

            const fEl = document.createElement("div");
            fEl.className = "field"; fEl.draggable = true; fEl.dataset.fid = field.id;

            const handle = document.createElement("i");
            handle.className = "ti ti-grip-vertical field-handle";
            handle.setAttribute("aria-hidden","true");

            const inner = document.createElement("div");
            inner.className = "field-inner";

            const lbl = document.createElement("span");
            lbl.className = "field-label";
            lbl.textContent = field.label;

            const inputEl = makeFieldInput(field);

            inner.appendChild(lbl);
            inner.appendChild(inputEl);

            const badge = document.createElement("span");
            badge.className = "field-type-badge";
            badge.textContent = field.type;

            const delF = document.createElement("button");
            delF.className = "delete-btn";
            delF.title = "Remove field";
            delF.innerHTML = `<i class="ti ti-x"></i>`;
            delF.addEventListener("click", e => {

                e.stopPropagation();
                releaseId(field.id);
                sec.fields.splice(fi, 1);
                render(); updatePreview();
            
        });

            fEl.appendChild(handle);
            fEl.appendChild(inner);
            fEl.appendChild(badge);
            fEl.appendChild(delF);

            fEl.addEventListener("dragstart", e => {

                if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
                dragType = "field"; dragSrc = field.id; dragSrcSection = sec.id;
                setTimeout(() => fEl.classList.add("dragging"), 0);
                e.dataTransfer.effectAllowed = "move";
                e.stopPropagation();
            
        });
            fEl.addEventListener("dragend", () => {
        fEl.classList.remove("dragging"); clearDropIndicators(); 
        });
            fEl.addEventListener("dragover", e => {

                if (dragType !== "field") return;
                e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect = "move";
                clearDropIndicators(); fEl.classList.add("drop-indicator");
            
        });
            fEl.addEventListener("dragleave", () => fEl.classList.remove("drop-indicator"));
            fEl.addEventListener("drop", e => {

                e.preventDefault(); e.stopPropagation();
                if (dragType !== "field" || dragSrc === field.id) return;
                const srcSec = sheet.sections.find(s => s.id === dragSrcSection);
                const fromIdx = srcSec.fields.findIndex(f => f.id === dragSrc);
                const [moved] = srcSec.fields.splice(fromIdx, 1);
                const toIdx = sec.fields.findIndex(f => f.id === field.id);
                sec.fields.splice(toIdx, 0, moved);
                render(); updatePreview();
            
        });

            fieldList.appendChild(fEl);
            
        });

            fieldList.addEventListener("dragover", e => {
        if (dragType === "field") e.preventDefault(); 
        });
            fieldList.addEventListener("drop", e => {

            e.preventDefault();
            if (dragType !== "field") return;
            const srcSec = sheet.sections.find(s => s.id === dragSrcSection);
            if (!srcSec) return;
            const fromIdx = srcSec.fields.findIndex(f => f.id === dragSrc);
            if (fromIdx === -1) return;
            const [moved] = srcSec.fields.splice(fromIdx, 1);
            sec.fields.push(moved);
            dragSrcSection = sec.id;
            render(); updatePreview();
            
        });

            const addRow = document.createElement("div");
            addRow.className = "add-field-row";

            const labelInp = document.createElement("input");
            labelInp.placeholder = "Field label…";

            const typeSelect = document.createElement("select");
            ["text","number","textarea","checkbox"].forEach(t => {

            const opt = document.createElement("option");
            opt.value = t; opt.textContent = t;
            typeSelect.appendChild(opt);
            
        });

            const addBtn = document.createElement("button");
            addBtn.innerHTML = `<i class="ti ti-plus" aria-hidden="true"></i>`;
            addBtn.addEventListener("click", () => {

            const label = labelInp.value.trim();
            if (!label) return;
            sec.fields.push({
        id: genId(), label, type: typeSelect.value, value: "" 
        });
            labelInp.value = "";
            render(); updatePreview();
            
        });
            labelInp.addEventListener("keydown", e => {
        if (e.key === "Enter") addBtn.click(); 
        });

            addRow.appendChild(labelInp);
            addRow.appendChild(typeSelect);
            addRow.appendChild(addBtn);

            secEl.appendChild(hdr);
            secEl.appendChild(fieldList);
            secEl.appendChild(addRow);
            list.appendChild(secEl);
        
        });

        updatePreview();

        }

        function clearDropIndicators() {

        document.querySelectorAll(".drop-indicator").forEach(el => el.classList.remove("drop-indicator"));

        }

        document.getElementById("btn-add-section").addEventListener("click", () => {

        const inp = document.getElementById("new-section-name");
        const label = inp.value.trim() || "New section";
        sheet.sections.push({
        id: genId(), label, fields: [] 
        });
        inp.value = ""; render();

        });

        document.getElementById("new-section-name").addEventListener("keydown", e => {

        if (e.key === "Enter") document.getElementById("btn-add-section").click();

        });

        document.getElementById("btn-save").addEventListener("click", () => {

        const blob = new Blob([JSON.stringify(sheet, null, 2)], {
        type: "application/json" 
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = "character-sheet.json"; a.click();
        URL.revokeObjectURL(url);

        });

        document.getElementById("btn-load-trigger").addEventListener("click", () => {

        document.getElementById("file-input").click();

        });

        document.getElementById("file-input").addEventListener("change", e => {

        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {

            try {

            const parsed = JSON.parse(ev.target.result);
            if (!parsed.sections) {
        alert("Invalid character sheet JSON."); return; 
        }
            registerIds(parsed); sheet = parsed; render();
            
        } catch {
        alert("Could not parse JSON file."); 
        }
        
        };
        reader.readAsText(file);

        });

        let previewVisible = false;
        document.getElementById("btn-preview").addEventListener("click", () => {

        previewVisible = !previewVisible;
        const el = document.getElementById("json-preview");
        const btn = document.getElementById("btn-preview");
        el.style.display = previewVisible ? "block" : "none";
        btn.innerHTML = previewVisible
            ? `<i class="ti ti-code" aria-hidden="true"></i> Hide JSON`
            : `<i class="ti ti-code" aria-hidden="true"></i> Show JSON`;
        updatePreview();

        });

        function updatePreview() {

        if (!previewVisible) return;
        document.getElementById("json-preview").textContent = JSON.stringify(sheet, null, 2);

        }

        render();
        </script>

    </body>
</html>
